name: Build Driver Package

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build configuration (release/debug)'
        required: true
        default: 'release'
      sign_key:
        description: 'Code signing certificate thumbprint'
        required: false
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install genisoimage
      run: sudo apt-get update -qq && sudo apt-get install -y -qq genisoimage

    - name: Build installer
      run: |
        GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
        go build -ldflags="-s -w -H=windowsgui" \
          -o isodir/setup.exe .
        ls -lh isodir/setup.exe

    - name: Create driver package
      run: |
        cp isodir/setup.exe isodir/uninstall.exe
        ls -lh isodir/
        ls -lh isodir/KM-Universal-Driver/

    - name: Build ISO
      run: |
        genisoimage -o Konica_Minolta_Driver_v2.3.1.iso isodir/
        ls -lh Konica_Minolta_Driver_v2.3.1.iso

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: Konica_Minolta_Driver_v2.3.1
        path: Konica_Minolta_Driver_v2.3.1.iso

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: setup
        path: isodir/setup.exe
